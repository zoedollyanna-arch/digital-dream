<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dream Photos - Digital Dream</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .photos-wrap { padding: 16px; max-width: 440px; margin: 0 auto; }
        .photos-header-row {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
        }
        .photos-count { font-size: 13px; color: var(--text-muted, #8E8E93); }
        .photo-add-btn {
            padding: 8px 16px; border-radius: 100px; border: none;
            background: var(--primary, #007AFF); color: #fff;
            font-size: 13px; font-weight: 600; cursor: pointer;
            font-family: var(--font, 'Inter', sans-serif);
        }
        .photo-add-btn:hover { opacity: 0.85; }
        .photos-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 16px;
        }
        .photo-thumb {
            aspect-ratio: 1; border-radius: 10px; overflow: hidden; cursor: pointer;
            position: relative; border: 1px solid var(--border-glass, rgba(255,255,255,0.35));
        }
        .photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .photo-thumb .photo-date {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 4px 6px; font-size: 9px; color: #fff;
            background: linear-gradient(transparent, rgba(0,0,0,0.6));
            text-align: right;
        }
        .photo-empty {
            grid-column: 1 / -1; text-align: center; padding: 60px 20px;
            color: var(--text-muted, #8E8E93);
        }
        .photo-empty i { font-size: 40px; margin-bottom: 12px; display: block; opacity: 0.4; }
        .photo-empty p { font-size: 14px; }

        /* Lightbox */
        .photo-lightbox {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .photo-lightbox.open { display: flex; }
        .photo-lightbox img { max-width: 95%; max-height: 70vh; border-radius: 10px; object-fit: contain; }
        .lb-caption {
            color: #fff; font-size: 13px; margin-top: 10px; text-align: center;
            max-width: 90%; word-break: break-word;
        }
        .lb-bar {
            position: absolute; top: 12px; right: 12px; display: flex; gap: 10px;
        }
        .lb-btn {
            width: 36px; height: 36px; border-radius: 50%; border: none;
            background: rgba(255,255,255,0.2); color: #fff; font-size: 16px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .lb-btn:hover { background: rgba(255,255,255,0.3); }

        /* Add modal */
        .photo-modal-bg {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 900;
            display: none; align-items: center; justify-content: center;
        }
        .photo-modal-bg.open { display: flex; }
        .photo-modal {
            background: var(--bg-primary, #FFFFFF); border-radius: 18px;
            padding: 24px; width: 90%; max-width: 360px;
        }
        .photo-modal h3 { margin-bottom: 14px; font-size: 18px; }
        .photo-modal label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px; color: var(--text-primary, #1C1C1E); }
        .photo-modal input, .photo-modal textarea {
            width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border-glass, rgba(255,255,255,0.35));
            background: var(--bg-glass, rgba(255,255,255,0.45)); font-size: 14px;
            font-family: var(--font, 'Inter', sans-serif); color: var(--text-primary, #1C1C1E);
            margin-bottom: 12px; box-sizing: border-box;
        }
        .photo-modal textarea { resize: none; height: 60px; }
        .photo-modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
        .photo-modal-btns button {
            padding: 8px 20px; border-radius: 100px; border: none; cursor: pointer;
            font-size: 14px; font-weight: 600;
            font-family: var(--font, 'Inter', sans-serif);
        }
        .pm-cancel { background: var(--bg-glass, rgba(255,255,255,0.45)); color: var(--text-primary, #1C1C1E); }
        .pm-save { background: var(--primary, #007AFF); color: #fff; }
    </style>
</head>
<body>
    <div class="tablet-bg"></div>
    <div class="status-bar">
        <div class="status-left"><span class="status-time" id="statusTime">12:00 PM</span></div>
        <div class="status-right">
            <i class="fas fa-wifi"></i><i class="fas fa-signal"></i>
            <div class="battery"><div class="battery-bar"><div class="battery-fill"></div></div></div>
        </div>
    </div>

    <div class="app-container">
        <div class="app-header">
            <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
            <div class="app-title">Dream Photos <small>Your gallery</small></div>
        </div>
        <div class="photos-wrap">
            <div class="photos-header-row">
                <span class="photos-count" id="pCount">0 photos</span>
                <button class="photo-add-btn" onclick="openAddModal()"><i class="fas fa-plus"></i> Add Photo</button>
            </div>
            <div class="photos-grid" id="pGrid"></div>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="photo-lightbox" id="pLightbox">
        <div class="lb-bar">
            <button class="lb-btn" onclick="deletePhoto()"><i class="fas fa-trash"></i></button>
            <button class="lb-btn" onclick="closeLightbox()"><i class="fas fa-times"></i></button>
        </div>
        <img id="lbImg" src="" alt="">
        <div class="lb-caption" id="lbCaption"></div>
    </div>

    <!-- Add Modal -->
    <div class="photo-modal-bg" id="pModal">
        <div class="photo-modal">
            <h3>Add Photo</h3>
            <label>Image URL</label>
            <input type="text" id="pmUrl" placeholder="Paste image URL here...">
            <label>Caption (optional)</label>
            <textarea id="pmCaption" placeholder="Describe this moment..."></textarea>
            <div class="photo-modal-btns">
                <button class="pm-cancel" onclick="closeAddModal()">Cancel</button>
                <button class="pm-save" onclick="savePhoto()">Save</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="messages.html" class="nav-item"><i class="fas fa-comment"></i><span>Chat</span></a>
        <a href="dreamstore.html" class="nav-item"><i class="fas fa-store"></i><span>Store</span></a>
        <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
    </div>

    <script src="js/config.js"></script>
    <script src="js/catalog.js"></script>
    <script src="js/app.js"></script>
    <script>
        var photos = [];
        var viewIdx = -1;

        async function load() {
            var dbData = await DreamApp.loadAppData('photos');
            if (dbData && Array.isArray(dbData)) {
                photos = dbData;
            } else {
                try { photos = JSON.parse(localStorage.getItem('dd-photos') || '[]'); } catch(e) { photos = []; }
                if (photos.length) DreamApp.saveAppData('photos', photos);
            }
            render();
        }
        function persist() { DreamApp.saveAppData('photos', photos); }

        function render() {
            document.getElementById('pCount').textContent = photos.length + ' photo' + (photos.length !== 1 ? 's' : '');
            if (!photos.length) {
                document.getElementById('pGrid').innerHTML = '<div class="photo-empty"><i class="fas fa-camera"></i><p>No photos yet.<br>Add your first photo!</p></div>';
                return;
            }
            var html = photos.map(function(p, i) {
                var d = new Date(p.date);
                var dateStr = (d.getMonth()+1) + '/' + d.getDate();
                return '<div class="photo-thumb" onclick="openLightbox(' + i + ')">' +
                    '<img src="' + DreamApp.escapeHtml(p.url) + '" alt="Photo" onerror="this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect fill=%22%23ddd%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23999%22 font-size=%2212%22>No img</text></svg>\'">' +
                    '<div class="photo-date">' + dateStr + '</div></div>';
            }).join('');
            document.getElementById('pGrid').innerHTML = html;
        }

        function openAddModal() {
            document.getElementById('pmUrl').value = '';
            document.getElementById('pmCaption').value = '';
            document.getElementById('pModal').classList.add('open');
        }
        function closeAddModal() { document.getElementById('pModal').classList.remove('open'); }

        function savePhoto() {
            var url = document.getElementById('pmUrl').value.trim();
            if (!url) { DreamApp.toast('Please enter an image URL', 'error'); return; }
            var caption = document.getElementById('pmCaption').value.trim();
            photos.unshift({ url: url, caption: caption, date: Date.now() });
            persist(); render(); closeAddModal();
            DreamApp.playSuccess();
            DreamApp.toast('Photo added!', 'success');
        }

        function openLightbox(i) {
            viewIdx = i;
            var p = photos[i];
            document.getElementById('lbImg').src = p.url;
            document.getElementById('lbCaption').textContent = p.caption || '';
            document.getElementById('pLightbox').classList.add('open');
        }
        function closeLightbox() {
            document.getElementById('pLightbox').classList.remove('open');
            viewIdx = -1;
        }

        function deletePhoto() {
            if (viewIdx < 0) return;
            photos.splice(viewIdx, 1);
            persist(); render(); closeLightbox();
            DreamApp.toast('Photo removed');
        }

        document.addEventListener('DOMContentLoaded', function() { load(); });
    </script>
</body>
</html>
