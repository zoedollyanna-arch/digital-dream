<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Digital Dream</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .installed-apps-label {
            padding: 4px 20px 0; font-size: 11px; font-weight: 600;
            color: var(--text-muted, #8E8E93); letter-spacing: 0.5px; text-transform: uppercase;
        }
    </style>
    <script>
        // First-time setup redirect (fallback if not coming from boot.html)
        if (localStorage.getItem('dd-onboarded') !== 'true') {
            // Check backend first before redirecting to onboarding
            var qs = window.location.search;
            var sp = new URLSearchParams(qs);
            var uid = sp.get('uuid');
            if (uid) {
                // Quick async check — if profile exists on server, we're good
                fetch(window.location.origin + '/api/profile?uuid=' + encodeURIComponent(uid))
                    .then(function(r) { return r.json(); })
                    .then(function(d) {
                        if (d.found && d.profile && d.profile.onboarded) {
                            // Restore profile from server
                            try {
                                var p = d.profile;
                                localStorage.setItem('dd-onboarded', 'true');
                                if (p.name) localStorage.setItem('dd-name', p.name);
                                if (p.theme) localStorage.setItem('dd-theme', p.theme);
                                localStorage.setItem('dd-wallpaper', p.wallpaper || '');
                                if (p.zoom) localStorage.setItem('dd-zoom', String(p.zoom));
                                if (p.notifications) {
                                    localStorage.setItem('dd-setting-notifs', String(p.notifications.notifs !== false));
                                    localStorage.setItem('dd-setting-discordNotifs', String(p.notifications.discordNotifs !== false));
                                    localStorage.setItem('dd-setting-sound', String(p.notifications.sound === true));
                                }
                                if (p.discord && p.discord.webhook) localStorage.setItem('dd-discord-config', JSON.stringify(p.discord));
                                if (p.installedApps && p.installedApps.length) localStorage.setItem('dd-installed-apps', JSON.stringify(p.installedApps));
                            } catch(e) {}
                            location.reload();
                        } else {
                            window.location.replace('onboarding.html' + qs);
                        }
                    }).catch(function() {
                        window.location.replace('onboarding.html' + qs);
                    });
            } else {
                window.location.replace('onboarding.html' + qs);
            }
        }
    </script>
</head>
<body>
    <div class="tablet-bg"></div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-left">
            <span class="status-time" id="statusTime">12:00 PM</span>
        </div>
        <div class="status-right">
            <i class="fas fa-wifi"></i>
            <i class="fas fa-signal"></i>
            <div class="battery">
                <div class="battery-bar"><div class="battery-fill"></div></div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="app-container" id="homeScreen">
        <!-- Greeting -->
        <div class="home-greeting animate-fadeIn">
            <h1>Digital Dream</h1>
            <p id="greetingText">Good afternoon, Dreamer</p>
        </div>

        <!-- App Grid -->
        <div class="app-grid" id="appGrid">
            <a href="messages.html" class="app-icon animate-scaleIn animate-stagger-1">
                <div class="icon-circle icon-dreamchat">
                    <i class="fas fa-comment-dots"></i>
                </div>
                <span class="icon-label">DreamChat</span>
                <span class="notif-badge" id="chatBadge" style="display:none">0</span>
            </a>

            <a href="youtube.html" class="app-icon animate-scaleIn animate-stagger-2">
                <div class="icon-circle icon-dreamtube">
                    <i class="fab fa-youtube"></i>
                </div>
                <span class="icon-label">DreamTube</span>
            </a>

            <a href="weather.html" class="app-icon animate-scaleIn animate-stagger-3">
                <div class="icon-circle icon-weather">
                    <i class="fas fa-cloud-sun"></i>
                </div>
                <span class="icon-label">Weather</span>
            </a>

            <a href="dreamstore.html" class="app-icon animate-scaleIn animate-stagger-4">
                <div class="icon-circle icon-dreamstore">
                    <i class="fas fa-store"></i>
                </div>
                <span class="icon-label">Dream Store</span>
            </a>

            <a href="browser.html" class="app-icon animate-scaleIn animate-stagger-5">
                <div class="icon-circle icon-browser">
                    <i class="fas fa-globe"></i>
                </div>
                <span class="icon-label">Browser</span>
            </a>

            <a href="discord.html" class="app-icon animate-scaleIn animate-stagger-6">
                <div class="icon-circle icon-discord">
                    <i class="fab fa-discord"></i>
                </div>
                <span class="icon-label">Discord</span>
            </a>

            <a href="contacts.html" class="app-icon animate-scaleIn animate-stagger-7">
                <div class="icon-circle icon-contacts">
                    <i class="fas fa-address-book"></i>
                </div>
                <span class="icon-label">Contacts</span>
            </a>

            <a href="settings.html" class="app-icon animate-scaleIn animate-stagger-8">
                <div class="icon-circle icon-settings">
                    <i class="fas fa-cog"></i>
                </div>
                <span class="icon-label">Settings</span>
            </a>
        </div>

        <!-- Installed Apps from Dream Store -->
        <div id="installedSection" style="display:none">
            <div class="installed-apps-label">My Apps</div>
            <div class="app-grid" id="installedGrid" style="padding-top:8px"></div>
        </div>

        <!-- Quick Widget Area -->
        <div class="px-16 mt-16 animate-slideUp" style="animation-delay: 0.1s">
            <div class="glass-card" id="quickWeather" style="cursor:pointer" onclick="location.href='weather.html'">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-12">
                        <span style="font-size:28px" id="weatherEmoji">🌤️</span>
                        <div>
                            <div class="font-bold" id="quickTemp">--°F</div>
                            <div class="text-xs text-muted" id="quickWeatherDesc">Loading weather...</div>
                        </div>
                    </div>
                    <div style="text-align:right">
                        <div class="text-sm text-muted" id="quickCity">--</div>
                        <div class="text-xs text-muted">Tap for details</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="messages.html" class="nav-item">
            <i class="fas fa-comment"></i>
            <span>Chat</span>
            <div class="badge" id="navChatBadge" style="display:none"></div>
        </a>
        <a href="dreamstore.html" class="nav-item">
            <i class="fas fa-store"></i>
            <span>Store</span>
        </a>
        <a href="settings.html" class="nav-item">
            <i class="fas fa-cog"></i>
            <span>Settings</span>
        </a>
    </div>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Update greeting based on time of day
        function updateGreeting() {
            const h = new Date().getHours();
            const name = DreamApp.getUserName();
            let greeting = 'Good evening';
            if (h < 12) greeting = 'Good morning';
            else if (h < 17) greeting = 'Good afternoon';
            document.getElementById('greetingText').textContent = greeting + ', ' + DreamApp.escapeHtml(name);
        }

        // Load quick weather widget
        async function loadQuickWeather() {
            try {
                const data = await DreamApp.apiGet('/api/weather?city=' + encodeURIComponent(DDConfig.DEFAULT_CITY));
                if (data && data.temp !== undefined) {
                    document.getElementById('quickTemp').textContent = Math.round(data.temp) + '°F';
                    document.getElementById('quickWeatherDesc').textContent = data.description || 'Clear';
                    document.getElementById('quickCity').textContent = data.city || DDConfig.DEFAULT_CITY;
                    document.getElementById('weatherEmoji').textContent = getWeatherEmoji(data.icon);
                }
            } catch {
                document.getElementById('quickWeatherDesc').textContent = 'Tap to view weather';
            }
        }

        function getWeatherEmoji(icon) {
            const map = {
                '01d': '☀️', '01n': '🌙', '02d': '⛅', '02n': '☁️',
                '03d': '☁️', '03n': '☁️', '04d': '☁️', '04n': '☁️',
                '09d': '🌧️', '09n': '🌧️', '10d': '🌦️', '10n': '🌧️',
                '11d': '⛈️', '11n': '⛈️', '13d': '🌨️', '13n': '🌨️',
                '50d': '🌫️', '50n': '🌫️'
            };
            return map[icon] || '🌤️';
        }

        // Load unread message count
        async function loadUnreadCount() {
            try {
                const data = await DreamApp.apiGet('/api/messages/unread?uuid=' + encodeURIComponent(DreamApp.getUserId()));
                if (data && data.count > 0) {
                    document.getElementById('chatBadge').textContent = data.count;
                    document.getElementById('chatBadge').style.display = '';
                    document.getElementById('navChatBadge').style.display = '';
                }
            } catch {
                // Silent fail
            }
        }

        // Show installed Dream Store apps on home screen
        var storeAppCatalog = {
            notes:      { name: 'Notes',       icon: 'fas fa-sticky-note',   color: '#FF9F0A', page: 'notes.html' },
            journal:    { name: 'Journal',     icon: 'fas fa-book',          color: '#5856D6', page: 'journal.html' },
            todo:       { name: 'To-Do',       icon: 'fas fa-check-circle',  color: '#34C759', page: 'todo.html' },
            calculator: { name: 'Calculator',  icon: 'fas fa-calculator',    color: '#8E8E93', page: 'calculator.html' },
            trivia:     { name: 'Trivia',      icon: 'fas fa-brain',         color: '#FF2D55', page: 'trivia.html' },
            memory:     { name: 'Memory',      icon: 'fas fa-th',            color: '#5AC8FA', page: 'memory.html' },
            tictactoe:  { name: 'Tic-Tac-Toe', icon: 'fas fa-times',         color: '#007AFF', page: 'tictactoe.html' },
            snake:      { name: 'Snake',       icon: 'fas fa-gamepad',       color: '#34C759', page: 'snake.html' },
            doodle:     { name: 'Doodle',      icon: 'fas fa-paint-brush',   color: '#BF5AF2', page: 'doodle.html' },
            photos:     { name: 'Photos',      icon: 'fas fa-camera',        color: '#FF6259', page: 'photos.html' }
        };

        function renderInstalledApps() {
            var installed = JSON.parse(localStorage.getItem('dd-installed-apps') || '[]');
            var section = document.getElementById('installedSection');
            var grid = document.getElementById('installedGrid');
            if (!installed.length) { section.style.display = 'none'; return; }

            section.style.display = '';
            grid.innerHTML = installed.map(function(id) {
                var app = storeAppCatalog[id];
                if (!app) return '';
                return '<a href="' + app.page + '" class="app-icon">'
                    + '<div class="icon-circle" style="background:' + app.color + '">'
                    + '<i class="' + app.icon + '"></i></div>'
                    + '<span class="icon-label">' + app.name + '</span></a>';
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateGreeting();
            loadQuickWeather();
            loadUnreadCount();
            renderInstalledApps();
        });
    </script>
</body>
</html>
