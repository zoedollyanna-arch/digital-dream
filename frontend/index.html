<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Digital Dream</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="tablet-bg"></div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-left">
            <span class="status-time" id="statusTime">12:00 PM</span>
        </div>
        <div class="status-right">
            <i class="fas fa-wifi"></i>
            <i class="fas fa-signal"></i>
            <div class="battery">
                <div class="battery-bar"><div class="battery-fill"></div></div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="app-container" id="homeScreen">
        <!-- Greeting -->
        <div class="home-greeting animate-fadeIn">
            <h1>Digital Dream</h1>
            <p id="greetingText">Good afternoon, Dreamer</p>
        </div>

        <!-- App Grid -->
        <div class="app-grid animate-slideUp">
            <!-- DreamChat (Messages) -->
            <a href="messages.html" class="app-icon">
                <div class="icon-circle icon-dreamchat">
                    <i class="fas fa-comment-dots"></i>
                </div>
                <span class="icon-label">DreamChat</span>
                <span class="notif-badge" id="chatBadge" style="display:none">0</span>
            </a>

            <!-- DreamTube (YouTube) -->
            <a href="youtube.html" class="app-icon">
                <div class="icon-circle icon-dreamtube">
                    <i class="fab fa-youtube"></i>
                </div>
                <span class="icon-label">DreamTube</span>
            </a>

            <!-- Weather -->
            <a href="weather.html" class="app-icon">
                <div class="icon-circle icon-weather">
                    <i class="fas fa-cloud-sun"></i>
                </div>
                <span class="icon-label">Weather</span>
            </a>

            <!-- Marketplace -->
            <a href="marketplace.html" class="app-icon">
                <div class="icon-circle icon-marketplace">
                    <i class="fas fa-shopping-bag"></i>
                </div>
                <span class="icon-label">Marketplace</span>
            </a>

            <!-- Browser -->
            <a href="browser.html" class="app-icon">
                <div class="icon-circle icon-browser">
                    <i class="fas fa-globe"></i>
                </div>
                <span class="icon-label">Browser</span>
            </a>

            <!-- Discord -->
            <a href="discord.html" class="app-icon">
                <div class="icon-circle icon-discord">
                    <i class="fab fa-discord"></i>
                </div>
                <span class="icon-label">Discord</span>
            </a>

            <!-- Texts (SL IM) -->
            <a href="messages.html?tab=texts" class="app-icon">
                <div class="icon-circle icon-texts">
                    <i class="fas fa-mobile-alt"></i>
                </div>
                <span class="icon-label">Texts</span>
            </a>

            <!-- Settings -->
            <a href="settings.html" class="app-icon">
                <div class="icon-circle icon-settings">
                    <i class="fas fa-cog"></i>
                </div>
                <span class="icon-label">Settings</span>
            </a>
        </div>

        <!-- Quick Widget Area -->
        <div class="px-16 mt-16 animate-slideUp" style="animation-delay: 0.1s">
            <div class="glass-card" id="quickWeather" style="cursor:pointer" onclick="location.href='weather.html'">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-12">
                        <span style="font-size:28px" id="weatherEmoji">🌤️</span>
                        <div>
                            <div class="font-bold" id="quickTemp">--°F</div>
                            <div class="text-xs text-muted" id="quickWeatherDesc">Loading weather...</div>
                        </div>
                    </div>
                    <div style="text-align:right">
                        <div class="text-sm text-muted" id="quickCity">--</div>
                        <div class="text-xs text-muted">Tap for details</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="messages.html" class="nav-item">
            <i class="fas fa-comment"></i>
            <span>Chat</span>
            <div class="badge" id="navChatBadge" style="display:none"></div>
        </a>
        <a href="browser.html" class="nav-item">
            <i class="fas fa-search"></i>
            <span>Browse</span>
        </a>
        <a href="settings.html" class="nav-item">
            <i class="fas fa-cog"></i>
            <span>Settings</span>
        </a>
    </div>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Update greeting based on time of day
        function updateGreeting() {
            const h = new Date().getHours();
            const name = DreamApp.getUserName();
            let greeting = 'Good evening';
            if (h < 12) greeting = 'Good morning';
            else if (h < 17) greeting = 'Good afternoon';
            document.getElementById('greetingText').textContent = greeting + ', ' + DreamApp.escapeHtml(name);
        }

        // Load quick weather widget
        async function loadQuickWeather() {
            try {
                const data = await DreamApp.apiGet('/api/weather?city=' + encodeURIComponent(DDConfig.DEFAULT_CITY));
                if (data && data.temp !== undefined) {
                    document.getElementById('quickTemp').textContent = Math.round(data.temp) + '°F';
                    document.getElementById('quickWeatherDesc').textContent = data.description || 'Clear';
                    document.getElementById('quickCity').textContent = data.city || DDConfig.DEFAULT_CITY;
                    document.getElementById('weatherEmoji').textContent = getWeatherEmoji(data.icon);
                }
            } catch {
                document.getElementById('quickWeatherDesc').textContent = 'Tap to view weather';
            }
        }

        function getWeatherEmoji(icon) {
            const map = {
                '01d': '☀️', '01n': '🌙', '02d': '⛅', '02n': '☁️',
                '03d': '☁️', '03n': '☁️', '04d': '☁️', '04n': '☁️',
                '09d': '🌧️', '09n': '🌧️', '10d': '🌦️', '10n': '🌧️',
                '11d': '⛈️', '11n': '⛈️', '13d': '🌨️', '13n': '🌨️',
                '50d': '🌫️', '50n': '🌫️'
            };
            return map[icon] || '🌤️';
        }

        // Load unread message count
        async function loadUnreadCount() {
            try {
                const data = await DreamApp.apiGet('/api/messages/unread?uuid=' + encodeURIComponent(DreamApp.getUserId()));
                if (data && data.count > 0) {
                    document.getElementById('chatBadge').textContent = data.count;
                    document.getElementById('chatBadge').style.display = '';
                    document.getElementById('navChatBadge').style.display = '';
                }
            } catch {
                // Silent fail
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateGreeting();
            loadQuickWeather();
            loadUnreadCount();
        });
    </script>
</body>
</html>
