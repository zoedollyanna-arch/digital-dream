<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Browser - Digital Dream</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .app-container { display: flex; flex-direction: column; }
        .quick-links { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 8px 20px; }
        .quick-link {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            padding: 14px 8px; background: var(--bg-glass, rgba(255,255,255,0.45));
            border: 1px solid var(--border-glass, rgba(255,255,255,0.35));
            border-radius: var(--radius-lg, 20px); cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none; color: var(--text-primary, #1C1C1E); font-size: 11px; font-weight: 500;
        }
        .quick-link:hover { transform: scale(1.03); box-shadow: var(--shadow-md); }
        .quick-link i { font-size: 22px; }
        .browser-note {
            margin: 12px 20px; padding: 12px 16px;
            background: rgba(0,122,255,0.08); border-radius: 12px;
            font-size: 12px; color: var(--text-secondary, #3C3C43);
            line-height: 1.4; text-align: center;
        }
        .browser-note i { color: var(--primary, #007AFF); margin-right: 4px; }
    </style>
</head>
<body>
    <div class="tablet-bg"></div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-left"><span class="status-time" id="statusTime">12:00 PM</span></div>
        <div class="status-right">
            <i class="fas fa-wifi"></i><i class="fas fa-signal"></i>
            <div class="battery"><div class="battery-bar"><div class="battery-fill"></div></div></div>
        </div>
    </div>

    <!-- App Content -->
    <div class="app-container">
        <!-- Browser Toolbar -->
        <div class="browser-toolbar">
            <div class="browser-controls">
                <button onclick="location.href='index.html'" title="Home"><i class="fas fa-home"></i></button>
            </div>
            <div class="browser-url-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="urlInput" placeholder="Search or enter URL..."
                       onkeydown="if(event.key==='Enter')navigate()">
            </div>
            <button onclick="navigate()" style="background:none;border:none;color:var(--secondary,#5856D6);cursor:pointer;padding:4px">
                <i class="fas fa-arrow-right"></i>
            </button>
        </div>

        <!-- Start Page -->
        <div id="startPage">
            <div class="text-center p-16">
                <div style="font-size:36px;margin-bottom:8px">🌐</div>
                <h2 style="font-size:18px;font-weight:600;color:var(--primary,#007AFF)">DreamBrowser</h2>
                <p class="text-xs text-muted mt-8">Safe Browsing for SL</p>
            </div>

            <div class="browser-note">
                <i class="fas fa-info-circle"></i>
                Tapping a link will open it on your tablet screen. Use the Home button on the toolbar or touch your tablet in-world to return.
            </div>

            <div class="px-16 mb-8">
                <div class="font-bold text-sm mb-8">Quick Links</div>
            </div>

            <div class="quick-links">
                <div class="quick-link" onclick="openSite('https://www.google.com')">
                    <i class="fab fa-google" style="color:#4285F4"></i>Google
                </div>
                <div class="quick-link" onclick="openSite('https://www.youtube.com')">
                    <i class="fab fa-youtube" style="color:#FF0000"></i>YouTube
                </div>
                <div class="quick-link" onclick="openSite('https://marketplace.secondlife.com')">
                    <i class="fas fa-shopping-bag" style="color:#FF9F0A"></i>SL Market
                </div>
                <div class="quick-link" onclick="openSite('https://www.wikipedia.org')">
                    <i class="fab fa-wikipedia-w"></i>Wikipedia
                </div>
                <div class="quick-link" onclick="openSite('https://wiki.secondlife.com')">
                    <i class="fas fa-book" style="color:#5856D6"></i>SL Wiki
                </div>
                <div class="quick-link" onclick="openSite('https://www.weather.com')">
                    <i class="fas fa-cloud-sun" style="color:#48CAE4"></i>Weather
                </div>
            </div>

            <!-- Bookmarks -->
            <div class="px-16 mt-16 mb-8">
                <div class="flex items-center justify-between">
                    <div class="font-bold text-sm">Bookmarks</div>
                </div>
            </div>
            <div id="bookmarkList" class="px-16"></div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="messages.html" class="nav-item"><i class="fas fa-comment"></i><span>Chat</span></a>
        <a href="dreamstore.html" class="nav-item"><i class="fas fa-store"></i><span>Store</span></a>
        <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
    </div>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script>
        function navigate() {
            var input = document.getElementById('urlInput').value.trim();
            if (!input) return;

            // If no protocol, check if it looks like a URL or a search
            if (!input.match(/^https?:\/\//i)) {
                if (input.indexOf('.') !== -1 && input.indexOf(' ') === -1) {
                    input = 'https://' + input;
                } else {
                    input = 'https://www.google.com/search?q=' + encodeURIComponent(input);
                }
            }

            openSite(input);
        }

        function openSite(url) {
            // Navigate the entire MOAP page to the URL
            // User returns by touching the HUD in-world (Core script re-sends the URL)
            window.location.href = url;
        }

        // Bookmarks
        function getBookmarks() {
            return JSON.parse(localStorage.getItem('dd-bookmarks') || '[]');
        }

        function removeBookmark(index) {
            var bm = getBookmarks();
            bm.splice(index, 1);
            localStorage.setItem('dd-bookmarks', JSON.stringify(bm));
            renderBookmarks();
        }

        function renderBookmarks() {
            var bm = getBookmarks();
            var container = document.getElementById('bookmarkList');
            if (bm.length === 0) {
                container.innerHTML = '<div class="text-xs text-muted text-center p-16">No bookmarks yet</div>';
                return;
            }
            container.innerHTML = bm.map(function(b, i) {
                var title = DreamApp.escapeHtml(b.title || b.url).substring(0, 35);
                var url = DreamApp.escapeHtml(b.url);
                return '<div class="contact-item" onclick="openSite(\'' + url + '\')">'
                    + '<i class="fas fa-bookmark" style="color:var(--secondary,#5856D6);font-size:16px"></i>'
                    + '<div class="contact-info"><div class="contact-name">' + title + '</div></div>'
                    + '<button onclick="event.stopPropagation();removeBookmark(' + i + ')" style="background:none;border:none;color:var(--danger,#FF3B30);cursor:pointer"><i class="fas fa-trash"></i></button>'
                    + '</div>';
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', renderBookmarks);
    </script>
</body>
</html>
