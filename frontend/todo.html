<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>To-Do List - Digital Dream</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .todo-list { padding: 0 16px; }
        .todo-item {
            display: flex; align-items: center; gap: 12px;
            background: var(--bg-glass, rgba(255,255,255,0.45));
            border: 1px solid var(--border-glass, rgba(255,255,255,0.35));
            border-radius: 14px; padding: 12px 14px; margin-bottom: 8px;
            transition: all 0.3s ease; animation: fadeIn 0.3s ease;
        }
        .todo-item.done { opacity: 0.5; }
        .todo-item.done .todo-text { text-decoration: line-through; color: var(--text-muted, #8E8E93); }
        .todo-check {
            width: 24px; height: 24px; border-radius: 50%;
            border: 2px solid var(--text-muted, #8E8E93); background: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease; flex-shrink: 0; font-size: 12px; color: transparent;
        }
        .todo-check.checked {
            background: var(--success, #34C759); border-color: var(--success, #34C759); color: #fff;
        }
        .todo-text { flex: 1; font-size: 14px; font-weight: 500; color: var(--text-primary, #1C1C1E); }
        .todo-delete {
            background: none; border: none; color: var(--danger, #FF3B30);
            font-size: 13px; cursor: pointer; opacity: 0.5; padding: 4px;
        }
        .todo-delete:hover { opacity: 1; }
        .todo-input-bar {
            display: flex; gap: 8px; padding: 12px 16px;
            position: sticky; top: 0; z-index: 10;
        }
        .todo-input {
            flex: 1; padding: 12px 16px; border-radius: 100px;
            border: 1.5px solid var(--border-subtle, rgba(0,0,0,0.06));
            background: var(--bg-glass, rgba(255,255,255,0.45));
            font-size: 14px; outline: none;
            color: var(--text-primary, #1C1C1E); font-family: var(--font, 'Inter', sans-serif);
        }
        .todo-input:focus { border-color: var(--primary, #007AFF); }
        .todo-add-btn {
            width: 44px; height: 44px; border-radius: 50%;
            background: var(--success, #34C759); color: #fff;
            border: none; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease;
        }
        .todo-add-btn:hover { transform: scale(1.1); }
        .todo-add-btn:active { transform: scale(0.95); }
        .todo-stats {
            text-align: center; padding: 8px; font-size: 12px;
            color: var(--text-muted, #8E8E93);
        }
        .todo-clear {
            text-align: center; padding: 8px;
        }
        .todo-clear button {
            background: none; border: none; color: var(--primary, #007AFF);
            font-size: 13px; font-weight: 500; cursor: pointer;
        }
        .empty-todo { text-align: center; padding: 60px 30px; color: var(--text-muted, #8E8E93); }
        .empty-todo i { font-size: 48px; opacity: 0.3; margin-bottom: 12px; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body>
    <div class="tablet-bg"></div>
    <div class="status-bar">
        <div class="status-left"><span class="status-time" id="statusTime">12:00 PM</span></div>
        <div class="status-right">
            <i class="fas fa-wifi"></i><i class="fas fa-signal"></i>
            <div class="battery"><div class="battery-bar"><div class="battery-fill"></div></div></div>
        </div>
    </div>

    <div class="app-container">
        <div class="app-header">
            <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
            <div class="app-title">To-Do List <small>Stay organized</small></div>
        </div>

        <div class="todo-input-bar">
            <input type="text" class="todo-input" id="todoInput" placeholder="Add a task..." maxlength="100">
            <button class="todo-add-btn" onclick="addTodo()"><i class="fas fa-plus"></i></button>
        </div>

        <div class="todo-stats" id="todoStats"></div>
        <div class="todo-list" id="todoList"></div>
        <div class="todo-clear" id="todoClear" style="display:none">
            <button onclick="clearDone()">Clear completed</button>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="messages.html" class="nav-item"><i class="fas fa-comment"></i><span>Chat</span></a>
        <a href="dreamstore.html" class="nav-item"><i class="fas fa-store"></i><span>Store</span></a>
        <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
    </div>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script>
        var todos = [];

        async function loadTodos() {
            var dbData = await DreamApp.loadAppData('todo');
            if (dbData && Array.isArray(dbData)) {
                todos = dbData;
            } else {
                try { todos = JSON.parse(localStorage.getItem('dd-todos') || '[]'); } catch(e) { todos = []; }
                if (todos.length) DreamApp.saveAppData('todo', todos);
            }
            renderTodos();
        }
        function persistTodos() { DreamApp.saveAppData('todo', todos); }

        function renderTodos() {
            var el = document.getElementById('todoList');
            if (!todos.length) {
                el.innerHTML = '<div class="empty-todo"><i class="fas fa-check-circle"></i><p>All clear!<br>Add a task above.</p></div>';
                document.getElementById('todoStats').textContent = '';
                document.getElementById('todoClear').style.display = 'none';
                return;
            }
            var doneCount = todos.filter(function(t){ return t.done; }).length;
            document.getElementById('todoStats').textContent = doneCount + ' of ' + todos.length + ' completed';
            document.getElementById('todoClear').style.display = doneCount > 0 ? '' : 'none';

            el.innerHTML = todos.map(function(t) {
                return '<div class="todo-item' + (t.done ? ' done' : '') + '">'
                    + '<button class="todo-check' + (t.done ? ' checked' : '') + '" onclick="toggleTodo(\'' + t.id + '\')">'
                    + (t.done ? '<i class="fas fa-check"></i>' : '') + '</button>'
                    + '<span class="todo-text">' + DreamApp.escapeHtml(t.text) + '</span>'
                    + '<button class="todo-delete" onclick="deleteTodo(\'' + t.id + '\')"><i class="fas fa-times"></i></button>'
                    + '</div>';
            }).join('');
        }

        function addTodo() {
            var input = document.getElementById('todoInput');
            var text = input.value.trim();
            if (!text) return;
            todos.unshift({ id: 't' + Date.now(), text: text, done: false });
            persistTodos();
            input.value = '';
            renderTodos();
            DreamApp.playTap();
        }

        function toggleTodo(id) {
            var t = todos.find(function(x) { return x.id === id; });
            if (t) { t.done = !t.done; persistTodos(); renderTodos(); }
            if (t && t.done) DreamApp.playSuccess();
        }

        function deleteTodo(id) {
            todos = todos.filter(function(x) { return x.id !== id; });
            persistTodos();
            renderTodos();
        }

        function clearDone() {
            todos = todos.filter(function(x) { return !x.done; });
            persistTodos();
            renderTodos();
            DreamApp.toast('Completed tasks cleared', 'info');
        }

        document.getElementById('todoInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') addTodo();
        });

        document.addEventListener('DOMContentLoaded', loadTodos);
    </script>
</body>
</html>
