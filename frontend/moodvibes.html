<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mood & Vibes - Digital Dream</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .wrap { padding: 0 16px 18px; }
        .mood-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 12px 0; }
        .mood-btn {
            border: none; border-radius: 16px; padding: 10px 0; font-size: 22px; cursor: pointer;
            background: var(--bg-glass, rgba(255,255,255,0.45)); border: 1px solid var(--border-glass, rgba(255,255,255,0.35));
        }
        .mood-btn.active { outline: 2px solid var(--primary, #007AFF); transform: translateY(-2px); }
        .hero { padding: 18px; margin-bottom: 12px; }
        .hero h3 { margin-bottom: 6px; }
        .meta { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
        .meta .glass-card { text-align: center; padding: 12px; }
        textarea, input {
            width: 100%; border: 1px solid var(--border-subtle, rgba(0,0,0,0.08)); border-radius: 14px; padding: 12px;
            background: var(--bg-input, rgba(120,120,128,0.08)); color: var(--text-primary, #1C1C1E); outline: none; font-family: inherit;
        }
        .action-row { display: flex; gap: 8px; margin-top: 10px; }
        .history-item { padding: 10px 0; border-bottom: 1px solid var(--border-subtle, rgba(0,0,0,0.06)); }
        .history-item:last-child { border-bottom: none; }
        .fortune-box { font-size: 14px; line-height: 1.5; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="tablet-bg"></div>
    <div class="status-bar">
        <div class="status-left"><span class="status-time" id="statusTime">12:00 PM</span></div>
        <div class="status-right"><i class="fas fa-wifi"></i><i class="fas fa-signal"></i><div class="battery"><div class="battery-bar"><div class="battery-fill"></div></div></div></div>
    </div>

    <div class="app-container">
        <div class="app-header">
            <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
            <div class="app-title">Mood & Vibes <small>Track your day and glow up</small></div>
        </div>

        <div class="wrap">
            <div class="glass-card hero glow">
                <div class="text-sm text-muted">Daily vibe card</div>
                <h3 id="dailyVibeTitle">Today's vibe</h3>
                <div class="fortune-box" id="dailyVibeText">Loading your quote...</div>
            </div>

            <div class="meta">
                <div class="glass-card"><strong id="streakNum">0</strong><div class="text-xs text-muted">Day streak</div></div>
                <div class="glass-card"><strong id="moodNum">🙂</strong><div class="text-xs text-muted">Current mood</div></div>
                <div class="glass-card"><strong id="checkinNum">0</strong><div class="text-xs text-muted">Check-ins</div></div>
            </div>

            <div class="glass-card" style="padding:14px;margin-bottom:12px">
                <div class="font-bold">How are you feeling today?</div>
                <div class="mood-row">
                    <button class="mood-btn active" data-mood="😊" onclick="pickMood(this)">😊</button>
                    <button class="mood-btn" data-mood="😌" onclick="pickMood(this)">😌</button>
                    <button class="mood-btn" data-mood="🤩" onclick="pickMood(this)">🤩</button>
                    <button class="mood-btn" data-mood="😴" onclick="pickMood(this)">😴</button>
                    <button class="mood-btn" data-mood="😢" onclick="pickMood(this)">😢</button>
                </div>
                <textarea id="moodNote" rows="3" placeholder="Add a quick note about your day..."></textarea>
                <div class="action-row">
                    <button class="btn btn-primary btn-sm" onclick="saveMood()"><i class="fas fa-heart"></i> Save check-in</button>
                    <button class="btn btn-secondary btn-sm" onclick="newVibe()"><i class="fas fa-sparkles"></i> New vibe</button>
                </div>
            </div>

            <div class="glass-card" style="padding:14px">
                <div class="font-bold">Recent check-ins</div>
                <div id="historyList" style="margin-top:8px"></div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="messages.html" class="nav-item"><i class="fas fa-comment"></i><span>Chat</span></a>
        <a href="dreamstore.html" class="nav-item"><i class="fas fa-store"></i><span>Store</span></a>
        <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
    </div>

    <script src="js/config.js"></script>
    <script src="js/catalog.js"></script>
    <script src="js/app.js"></script>
    <script>
        var selectedMood = '😊';
        var data = { entries: [], streak: 0, lastDate: '' };
        var vibeQuotes = [
            'Soft hearts still shine the brightest.',
            'You do not need to rush your glow-up.',
            'A calm mind is a powerful vibe.',
            'Small wins still count as magic.',
            'Today is a cute day to start again.',
            'Rest is productive too.'
        ];

        async function loadData() {
            var saved = await DreamApp.loadAppData('moodvibes');
            if (saved && typeof saved === 'object') data = saved;
            render();
            newVibe();
        }

        function persist() {
            DreamApp.saveAppData('moodvibes', data);
            localStorage.setItem('dd-mood-streak', String(data.streak || 0));
            DreamApp.updateStreak('moodStreak', data.streak || 0);
        }

        function pickMood(btn) {
            document.querySelectorAll('.mood-btn').forEach(function (el) { el.classList.remove('active'); });
            btn.classList.add('active');
            selectedMood = btn.getAttribute('data-mood');
        }

        function todayKey() {
            return new Date().toISOString().slice(0, 10);
        }

        function saveMood() {
            var note = document.getElementById('moodNote').value.trim();
            var today = todayKey();
            var existing = data.entries.find(function (entry) { return entry.day === today; });
            if (existing) {
                existing.mood = selectedMood;
                existing.note = note;
            } else {
                data.entries.unshift({ day: today, mood: selectedMood, note: note, time: Date.now() });
            }

            if (data.lastDate !== today) {
                var prev = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
                data.streak = (data.lastDate === prev) ? (data.streak || 0) + 1 : 1;
                data.lastDate = today;
            }

            persist();
            DreamApp.awardXp(8, 'Mood check-in saved');
            document.getElementById('moodNote').value = '';
            render();
            DreamApp.toast('Mood saved!', 'success');
        }

        function newVibe() {
            var quote = vibeQuotes[Math.floor(Math.random() * vibeQuotes.length)];
            document.getElementById('dailyVibeText').textContent = quote;
            document.getElementById('dailyVibeTitle').textContent = DreamApp.getDailyQuote().title;
        }

        function render() {
            document.getElementById('streakNum').textContent = data.streak || 0;
            document.getElementById('checkinNum').textContent = (data.entries || []).length;
            document.getElementById('moodNum').textContent = data.entries[0] ? data.entries[0].mood : '🙂';
            var list = document.getElementById('historyList');
            if (!data.entries.length) {
                list.innerHTML = '<div class="text-sm text-muted">No mood check-ins yet. Save your first vibe above.</div>';
                return;
            }
            list.innerHTML = data.entries.slice(0, 8).map(function (entry) {
                return '<div class="history-item"><strong>' + entry.mood + ' ' + entry.day + '</strong><div class="text-sm text-muted">' + DreamApp.escapeHtml(entry.note || 'Feeling cute and checking in.') + '</div></div>';
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
