<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tic Tac Toe - Digital Dream</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .ttt-wrap { padding: 16px; max-width: 440px; margin: 0 auto; text-align: center; }
        .ttt-status {
            font-size: 16px; font-weight: 600; margin-bottom: 14px; min-height: 24px;
            color: var(--text-primary, #1C1C1E);
        }
        .ttt-score-row {
            display: flex; justify-content: center; gap: 20px; margin-bottom: 16px;
        }
        .ttt-score-box {
            padding: 8px 18px; border-radius: 14px;
            background: var(--bg-glass, rgba(255,255,255,0.45));
            border: 1px solid var(--border-glass, rgba(255,255,255,0.35));
            font-size: 13px; font-weight: 600; text-align: center;
        }
        .ttt-score-box strong { display: block; font-size: 20px; margin-top: 2px; color: var(--primary, #007AFF); }
        .ttt-board {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
            max-width: 280px; margin: 0 auto 16px;
        }
        .ttt-cell {
            aspect-ratio: 1; border-radius: 14px;
            background: var(--bg-glass, rgba(255,255,255,0.45));
            border: 2px solid var(--border-glass, rgba(255,255,255,0.35));
            font-size: 38px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease;
            font-family: var(--font, 'Inter', sans-serif); color: var(--text-primary, #1C1C1E);
        }
        .ttt-cell:hover:not(.taken) { border-color: var(--primary, #007AFF); background: rgba(0,122,255,0.04); }
        .ttt-cell:active:not(.taken) { transform: scale(0.95); }
        .ttt-cell.x { color: var(--primary, #007AFF); }
        .ttt-cell.o { color: #FF6B9D; }
        .ttt-cell.win-cell { background: rgba(52,199,89,0.12); border-color: var(--success, #34C759); }
        .ttt-btns { display: flex; gap: 10px; justify-content: center; }
        .ttt-btn {
            padding: 10px 24px; border-radius: 100px; border: none;
            font-size: 14px; font-weight: 600; cursor: pointer;
            font-family: var(--font, 'Inter', sans-serif);
        }
        .ttt-btn.primary { background: var(--primary, #007AFF); color: #fff; }
        .ttt-btn.secondary {
            background: var(--bg-glass, rgba(255,255,255,0.45));
            border: 1px solid var(--border-glass, rgba(255,255,255,0.35));
            color: var(--text-primary, #1C1C1E);
        }
        .ttt-btn:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="tablet-bg"></div>
    <div class="status-bar">
        <div class="status-left"><span class="status-time" id="statusTime">12:00 PM</span></div>
        <div class="status-right">
            <i class="fas fa-wifi"></i><i class="fas fa-signal"></i>
            <div class="battery"><div class="battery-bar"><div class="battery-fill"></div></div></div>
        </div>
    </div>

    <div class="app-container">
        <div class="app-header">
            <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
            <div class="app-title">Tic Tac Toe <small>You vs AI</small></div>
        </div>
        <div class="ttt-wrap">
            <div class="ttt-score-row">
                <div class="ttt-score-box">You (X)<strong id="sX">0</strong></div>
                <div class="ttt-score-box">Draws<strong id="sD">0</strong></div>
                <div class="ttt-score-box">AI (O)<strong id="sO">0</strong></div>
            </div>
            <div class="ttt-status" id="tStatus">Your turn!</div>
            <div class="ttt-board" id="tBoard"></div>
            <div class="ttt-btns">
                <button class="ttt-btn primary" onclick="newGame()">New Game</button>
                <button class="ttt-btn secondary" onclick="resetScore()">Reset Score</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="messages.html" class="nav-item"><i class="fas fa-comment"></i><span>Chat</span></a>
        <a href="dreamstore.html" class="nav-item"><i class="fas fa-store"></i><span>Store</span></a>
        <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
    </div>

    <script src="js/config.js"></script>
    <script src="js/catalog.js"></script>
    <script src="js/app.js"></script>
    <script>
        var board, turn, gameOver, wins, scores;
        var winLines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

        async function loadScores() {
            var dbData = await DreamApp.loadAppData('tictactoe');
            if (dbData && typeof dbData === 'object' && dbData.x !== undefined) {
                scores = dbData;
            } else {
                try { scores = JSON.parse(localStorage.getItem('dd-ttt-scores')) || {x:0,o:0,d:0}; }
                catch(e) { scores = {x:0,o:0,d:0}; }
                if (scores.x || scores.o || scores.d) DreamApp.saveAppData('tictactoe', scores);
            }
            document.getElementById('sX').textContent = scores.x;
            document.getElementById('sO').textContent = scores.o;
            document.getElementById('sD').textContent = scores.d;
        }
        function saveScores() {
            DreamApp.saveAppData('tictactoe', scores);
        }
        function refreshScoreUI() {
            document.getElementById('sX').textContent = scores.x;
            document.getElementById('sO').textContent = scores.o;
            document.getElementById('sD').textContent = scores.d;
        }

        function newGame() {
            board = ['','','','','','','','',''];
            turn = 'X'; gameOver = false;
            document.getElementById('tStatus').textContent = 'Your turn!';
            renderBoard();
        }

        function renderBoard() {
            var html = board.map(function(v, i) {
                var cls = 'ttt-cell';
                if (v) cls += ' taken ' + v.toLowerCase();
                return '<div class="' + cls + '" data-i="' + i + '" onclick="play(' + i + ')">' + v + '</div>';
            }).join('');
            document.getElementById('tBoard').innerHTML = html;
        }

        function play(i) {
            if (gameOver || board[i] || turn !== 'X') return;
            board[i] = 'X';
            DreamApp.playTap();
            if (checkEnd()) return;
            turn = 'O';
            document.getElementById('tStatus').textContent = 'AI thinking...';
            renderBoard();
            setTimeout(aiMove, 400);
        }

        function aiMove() {
            /* Simple minimax-lite: win > block > center > corner > edge */
            var move = findWinMove('O');
            if (move === -1) move = findWinMove('X'); // block
            if (move === -1 && !board[4]) move = 4;
            if (move === -1) {
                var corners = [0,2,6,8].filter(function(c){return !board[c];});
                if (corners.length) move = corners[Math.floor(Math.random()*corners.length)];
            }
            if (move === -1) {
                var empty = board.map(function(v,i){return v?-1:i;}).filter(function(v){return v>=0;});
                move = empty[Math.floor(Math.random()*empty.length)];
            }
            board[move] = 'O';
            if (checkEnd()) return;
            turn = 'X';
            document.getElementById('tStatus').textContent = 'Your turn!';
            renderBoard();
        }

        function findWinMove(p) {
            for (var i = 0; i < 9; i++) {
                if (board[i]) continue;
                board[i] = p;
                if (getWinner() === p) { board[i] = ''; return i; }
                board[i] = '';
            }
            return -1;
        }

        function getWinner() {
            for (var i = 0; i < winLines.length; i++) {
                var l = winLines[i];
                if (board[l[0]] && board[l[0]] === board[l[1]] && board[l[1]] === board[l[2]])
                    return board[l[0]];
            }
            return null;
        }

        function getWinLine() {
            for (var i = 0; i < winLines.length; i++) {
                var l = winLines[i];
                if (board[l[0]] && board[l[0]] === board[l[1]] && board[l[1]] === board[l[2]])
                    return l;
            }
            return null;
        }

        function checkEnd() {
            var winner = getWinner();
            if (winner) {
                gameOver = true;
                var line = getWinLine();
                renderBoard();
                if (line) {
                    line.forEach(function(idx) {
                        document.querySelectorAll('.ttt-cell')[idx].classList.add('win-cell');
                    });
                }
                if (winner === 'X') {
                    scores.x++; document.getElementById('tStatus').textContent = 'You win! 🎉';
                    DreamApp.playSuccess();
                } else {
                    scores.o++; document.getElementById('tStatus').textContent = 'AI wins!';
                    DreamApp.playNotification();
                }
                saveScores(); refreshScoreUI();
                return true;
            }
            if (board.every(function(v){return v;})) {
                gameOver = true; scores.d++;
                document.getElementById('tStatus').textContent = "It's a draw!";
                saveScores(); refreshScoreUI(); renderBoard();
                return true;
            }
            return false;
        }

        function resetScore() {
            scores = {x:0,o:0,d:0}; saveScores(); refreshScoreUI();
            DreamApp.toast('Scores reset');
        }

        document.addEventListener('DOMContentLoaded', async function() { await loadScores(); newGame(); });
    </script>
</body>
</html>
