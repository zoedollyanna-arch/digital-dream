<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dream Store - Digital Dream</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .store-hero {
            padding: 16px 20px 12px;
            text-align: center;
        }
        .store-hero h2 {
            font-size: 20px; font-weight: 600; color: var(--text-primary, #1C1C1E);
        }
        .store-hero p {
            font-size: 13px; color: var(--text-muted, #8E8E93); margin-top: 4px;
        }
        .store-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 12px; padding: 8px 16px;
        }
        .store-card {
            background: var(--bg-glass, rgba(255,255,255,0.45));
            border: 1px solid var(--border-glass, rgba(255,255,255,0.35));
            border-radius: 18px; padding: 16px; text-align: center;
            cursor: pointer; transition: all 0.3s ease;
            position: relative; overflow: hidden;
        }
        .store-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .store-card.installed { opacity: 0.7; }
        .store-icon {
            width: 56px; height: 56px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 10px; font-size: 24px; color: #fff;
        }
        .store-name {
            font-size: 14px; font-weight: 600;
            color: var(--text-primary, #1C1C1E); margin-bottom: 4px;
        }
        .store-desc {
            font-size: 11px; color: var(--text-muted, #8E8E93);
            line-height: 1.3; margin-bottom: 10px;
            min-height: 28px;
        }
        .store-btn {
            display: inline-block; padding: 6px 20px;
            border-radius: 100px; font-size: 12px; font-weight: 600;
            border: none; cursor: pointer; transition: all 0.2s ease;
        }
        .store-btn-get {
            background: var(--primary, #007AFF); color: #fff;
        }
        .store-btn-get:hover { background: #005EC4; }
        .store-btn-open {
            background: rgba(120,120,128,0.12); color: var(--text-secondary, #3C3C43);
        }
        .store-btn-open:hover { background: rgba(120,120,128,0.2); }
        .store-category {
            padding: 12px 20px 4px; font-size: 16px; font-weight: 600;
            color: var(--text-primary, #1C1C1E);
        }
        .store-tag {
            display: inline-block; padding: 2px 8px; border-radius: 8px;
            font-size: 9px; font-weight: 600; position: absolute;
            top: 10px; right: 10px;
        }
        .tag-new { background: #34C759; color: #fff; }
        .tag-popular { background: #FF9F0A; color: #fff; }
    </style>
</head>
<body>
    <div class="tablet-bg"></div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-left"><span class="status-time" id="statusTime">12:00 PM</span></div>
        <div class="status-right">
            <i class="fas fa-wifi"></i><i class="fas fa-signal"></i>
            <div class="battery"><div class="battery-bar"><div class="battery-fill"></div></div></div>
        </div>
    </div>

    <!-- App Content -->
    <div class="app-container">
        <div class="app-header">
            <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
            <div class="app-title">
                Dream Store
                <small>Apps & Games</small>
            </div>
        </div>

        <div class="store-hero">
            <h2>Discover Apps & Games</h2>
            <p>Download apps to customize your tablet!</p>
        </div>

        <!-- Productivity Apps -->
        <div class="store-category">Productivity</div>
        <div class="store-grid" id="prodGrid"></div>

        <!-- Games -->
        <div class="store-category">Games</div>
        <div class="store-grid" id="gamesGrid"></div>

        <!-- Social -->
        <div class="store-category">Social & Fun</div>
        <div class="store-grid" id="socialGrid"></div>

        <div style="height: 80px"></div>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="messages.html" class="nav-item"><i class="fas fa-comment"></i><span>Chat</span></a>
        <a href="dreamstore.html" class="nav-item active"><i class="fas fa-store"></i><span>Store</span></a>
        <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
    </div>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script>
        // ── App catalog ──
        var storeApps = {
            productivity: [
                { id: 'notes', name: 'Dream Notes', desc: 'Write notes & reminders', icon: 'fas fa-sticky-note', color: '#FF9F0A', tag: 'popular', page: 'notes.html' },
                { id: 'journal', name: 'My Journal', desc: 'Private daily journal', icon: 'fas fa-book', color: '#5856D6', tag: 'new', page: 'journal.html' },
                { id: 'todo', name: 'To-Do List', desc: 'Track your tasks', icon: 'fas fa-check-circle', color: '#34C759', tag: '', page: 'todo.html' },
                { id: 'calculator', name: 'Calculator', desc: 'Quick math helper', icon: 'fas fa-calculator', color: '#8E8E93', tag: '', page: 'calculator.html' }
            ],
            games: [
                { id: 'trivia', name: 'Dream Trivia', desc: 'Fun quiz challenges', icon: 'fas fa-brain', color: '#FF2D55', tag: 'popular', page: 'trivia.html' },
                { id: 'memory', name: 'Memory Match', desc: 'Card matching game', icon: 'fas fa-th', color: '#5AC8FA', tag: 'new', page: 'memory.html' },
                { id: 'tictactoe', name: 'Tic-Tac-Toe', desc: 'Classic X & O game', icon: 'fas fa-times', color: '#007AFF', tag: '', page: 'tictactoe.html' },
                { id: 'snake', name: 'Dream Snake', desc: 'Retro snake game', icon: 'fas fa-snake', color: '#34C759', tag: 'new', page: 'snake.html' }
            ],
            social: [
                { id: 'doodle', name: 'Doodle Pad', desc: 'Draw & share art', icon: 'fas fa-paint-brush', color: '#BF5AF2', tag: 'popular', page: 'doodle.html' },
                { id: 'photos', name: 'Photo Album', desc: 'Save SL snapshots', icon: 'fas fa-camera', color: '#FF6259', tag: '', page: 'photos.html' }
            ]
        };

        function getInstalled() {
            return JSON.parse(localStorage.getItem('dd-installed-apps') || '[]');
        }

        function setInstalled(list) {
            localStorage.setItem('dd-installed-apps', JSON.stringify(list));
        }

        function isInstalled(id) {
            return getInstalled().indexOf(id) !== -1;
        }

        function installApp(id) {
            var list = getInstalled();
            if (list.indexOf(id) === -1) {
                list.push(id);
                setInstalled(list);
            }
            renderStore();
            DreamApp.toast('App installed!', 'success');
        }

        function uninstallApp(id) {
            var list = getInstalled().filter(function(a) { return a !== id; });
            setInstalled(list);
            renderStore();
            DreamApp.toast('App removed', 'info');
        }

        function openApp(page) {
            window.location.href = page;
        }

        function renderCard(app) {
            var installed = isInstalled(app.id);
            var tag = '';
            if (app.tag === 'new') tag = '<span class="store-tag tag-new">NEW</span>';
            else if (app.tag === 'popular') tag = '<span class="store-tag tag-popular">HOT</span>';

            var btn;
            if (installed) {
                btn = '<button class="store-btn store-btn-open" onclick="event.stopPropagation();openApp(\'' + DreamApp.escapeHtml(app.page) + '\')">Open</button>'
                    + ' <button class="store-btn" style="background:none;color:var(--danger,#FF3B30);font-size:10px;padding:6px 8px" onclick="event.stopPropagation();uninstallApp(\'' + DreamApp.escapeHtml(app.id) + '\')" title="Remove"><i class="fas fa-trash"></i></button>';
            } else {
                btn = '<button class="store-btn store-btn-get" onclick="event.stopPropagation();installApp(\'' + DreamApp.escapeHtml(app.id) + '\')">GET</button>';
            }

            return '<div class="store-card' + (installed ? ' installed' : '') + '">'
                + tag
                + '<div class="store-icon" style="background:' + app.color + '"><i class="' + app.icon + '"></i></div>'
                + '<div class="store-name">' + DreamApp.escapeHtml(app.name) + '</div>'
                + '<div class="store-desc">' + DreamApp.escapeHtml(app.desc) + '</div>'
                + btn
                + '</div>';
        }

        function renderStore() {
            document.getElementById('prodGrid').innerHTML = storeApps.productivity.map(renderCard).join('');
            document.getElementById('gamesGrid').innerHTML = storeApps.games.map(renderCard).join('');
            document.getElementById('socialGrid').innerHTML = storeApps.social.map(renderCard).join('');
        }

        document.addEventListener('DOMContentLoaded', renderStore);
    </script>
</body>
</html>
