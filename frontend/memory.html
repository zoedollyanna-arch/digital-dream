<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Memory Match - Digital Dream</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .memory-wrap { padding: 16px; max-width: 440px; margin: 0 auto; }
        .memory-stats {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 16px; background: var(--bg-glass, rgba(255,255,255,0.45));
            border: 1px solid var(--border-glass, rgba(255,255,255,0.35));
            border-radius: 14px; margin-bottom: 14px; font-size: 13px; font-weight: 600;
        }
        .memory-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px;
        }
        .mem-card {
            aspect-ratio: 1; border-radius: 12px; cursor: pointer; position: relative;
            perspective: 600px; -webkit-perspective: 600px;
        }
        .mem-card-inner {
            width: 100%; height: 100%; position: relative;
            transition: transform 0.4s ease;
            transform-style: preserve-3d; -webkit-transform-style: preserve-3d;
        }
        .mem-card.flipped .mem-card-inner { transform: rotateY(180deg); }
        .mem-card-front, .mem-card-back {
            position: absolute; inset: 0; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            backface-visibility: hidden; -webkit-backface-visibility: hidden;
            font-size: 28px;
        }
        .mem-card-front {
            background: linear-gradient(135deg, var(--primary, #007AFF), #5856D6);
            color: rgba(255,255,255,0.5); z-index: 2;
        }
        .mem-card-back {
            transform: rotateY(180deg);
            background: var(--bg-glass, rgba(255,255,255,0.45));
            border: 2px solid var(--border-glass, rgba(255,255,255,0.35));
        }
        .mem-card.matched .mem-card-back { border-color: var(--success, #34C759); background: rgba(52,199,89,0.1); }
        .mem-card.matched { pointer-events: none; }
        .memory-restart {
            width: 100%; padding: 12px; border-radius: 100px;
            background: var(--primary, #007AFF); color: #fff; border: none;
            font-size: 15px; font-weight: 600; cursor: pointer;
            font-family: var(--font, 'Inter', sans-serif);
        }
        .memory-restart:hover { opacity: 0.85; }
        .mem-win {
            text-align: center; padding: 30px; display: none;
        }
        .mem-win h2 { font-size: 22px; margin-bottom: 6px; }
        .mem-win .win-emoji { font-size: 48px; margin-bottom: 12px; }
        .mem-win p { font-size: 14px; color: var(--text-muted, #8E8E93); margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="tablet-bg"></div>
    <div class="status-bar">
        <div class="status-left"><span class="status-time" id="statusTime">12:00 PM</span></div>
        <div class="status-right">
            <i class="fas fa-wifi"></i><i class="fas fa-signal"></i>
            <div class="battery"><div class="battery-bar"><div class="battery-fill"></div></div></div>
        </div>
    </div>

    <div class="app-container">
        <div class="app-header">
            <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
            <div class="app-title">Memory Match <small>Find the pairs</small></div>
        </div>
        <div class="memory-wrap">
            <div class="memory-stats">
                <span>Moves: <strong id="mMoves">0</strong></span>
                <span>Pairs: <strong id="mPairs">0</strong> / 8</span>
            </div>
            <div class="memory-grid" id="mGrid"></div>
            <div class="mem-win" id="mWin">
                <div class="win-emoji">🎉</div>
                <h2>You Win!</h2>
                <p id="mWinMsg"></p>
                <button class="memory-restart" onclick="startGame()">Play Again</button>
            </div>
            <button class="memory-restart" id="mRestart" onclick="startGame()">New Game</button>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="messages.html" class="nav-item"><i class="fas fa-comment"></i><span>Chat</span></a>
        <a href="dreamstore.html" class="nav-item"><i class="fas fa-store"></i><span>Store</span></a>
        <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
    </div>

    <script src="js/config.js"></script>
    <script src="js/catalog.js"></script>
    <script src="js/app.js"></script>
    <script>
        var emojis = ['🌸','🌊','🔮','🎵','🦋','🍭','⭐','🌙'];
        var cards, flipped, matched, moves, lockBoard;

        function shuffle(a) {
            for (var i = a.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var t = a[i]; a[i] = a[j]; a[j] = t;
            }
            return a;
        }

        var memoryData = {};

        async function loadMemoryData() {
            var dbData = await DreamApp.loadAppData('memory');
            if (dbData && typeof dbData === 'object') {
                memoryData = dbData;
            } else {
                memoryData = { best: parseInt(localStorage.getItem('dd-memory-best') || '999', 10) };
                if (memoryData.best < 999) DreamApp.saveAppData('memory', memoryData);
            }
        }

        function startGame() {
            cards = shuffle(emojis.concat(emojis).slice());
            flipped = []; matched = 0; moves = 0; lockBoard = false;
            document.getElementById('mMoves').textContent = '0';
            document.getElementById('mPairs').textContent = '0';
            document.getElementById('mWin').style.display = 'none';
            document.getElementById('mRestart').style.display = '';

            var html = cards.map(function(e, i) {
                return '<div class="mem-card" data-idx="' + i + '" onclick="flipCard(this)">' +
                    '<div class="mem-card-inner">' +
                    '<div class="mem-card-front"><i class="fas fa-question"></i></div>' +
                    '<div class="mem-card-back">' + e + '</div>' +
                    '</div></div>';
            }).join('');
            document.getElementById('mGrid').innerHTML = html;
        }

        function flipCard(el) {
            if (lockBoard) return;
            if (el.classList.contains('flipped') || el.classList.contains('matched')) return;

            el.classList.add('flipped');
            DreamApp.playTap();
            flipped.push(el);

            if (flipped.length === 2) {
                moves++;
                document.getElementById('mMoves').textContent = moves;
                lockBoard = true;
                var a = parseInt(flipped[0].dataset.idx, 10);
                var b = parseInt(flipped[1].dataset.idx, 10);

                if (cards[a] === cards[b]) {
                    flipped[0].classList.add('matched');
                    flipped[1].classList.add('matched');
                    matched++;
                    document.getElementById('mPairs').textContent = matched;
                    DreamApp.playSuccess();
                    flipped = [];
                    lockBoard = false;
                    if (matched === emojis.length) win();
                } else {
                    setTimeout(function() {
                        flipped[0].classList.remove('flipped');
                        flipped[1].classList.remove('flipped');
                        flipped = [];
                        lockBoard = false;
                    }, 700);
                }
            }
        }

        function win() {
            setTimeout(function() {
                document.getElementById('mRestart').style.display = 'none';
                document.getElementById('mWin').style.display = '';
                document.getElementById('mWinMsg').textContent = 'Completed in ' + moves + ' moves!';
                var best = memoryData.best || 999;
                if (moves < best) { memoryData.best = moves; DreamApp.saveAppData('memory', memoryData); DreamApp.toast('New best score!', 'success'); }
            }, 500);
        }

        document.addEventListener('DOMContentLoaded', async function() {
            await loadMemoryData();
            startGame();
        });
    </script>
</body>
</html>
