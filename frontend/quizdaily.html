<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quiz of the Day - Digital Dream</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .wrap { padding: 0 16px 18px; }
        .answer-btn { width:100%; padding:12px; border:none; border-radius:14px; margin-top:8px; text-align:left; cursor:pointer; background:var(--bg-input, rgba(120,120,128,0.08)); }
        .answer-btn.correct { background:#D7F5E5; }
        .answer-btn.wrong { background:#FFE0E0; }
    </style>
</head>
<body>
    <div class="tablet-bg"></div>
    <div class="status-bar"><div class="status-left"><span class="status-time" id="statusTime">12:00 PM</span></div><div class="status-right"><i class="fas fa-wifi"></i><i class="fas fa-signal"></i><div class="battery"><div class="battery-bar"><div class="battery-fill"></div></div></div></div></div>

    <div class="app-container">
        <div class="app-header">
            <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
            <div class="app-title">Quiz of the Day <small>Music, movies, school & pop culture</small></div>
        </div>

        <div class="wrap">
            <div class="glass-card" style="padding:18px">
                <div class="text-sm text-muted" id="quizCategory">Category</div>
                <h3 id="quizQuestion" style="margin:8px 0">Loading...</h3>
                <div id="answersWrap"></div>
                <div id="quizResult" class="text-sm text-muted" style="margin-top:10px"></div>
                <div style="margin-top:12px"><button class="btn btn-sm btn-primary" onclick="nextQuestion()"><i class="fas fa-bolt"></i> Next question</button></div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="messages.html" class="nav-item"><i class="fas fa-comment"></i><span>Chat</span></a>
        <a href="dreamstore.html" class="nav-item"><i class="fas fa-store"></i><span>Store</span></a>
        <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
    </div>

    <script src="js/config.js"></script>
    <script src="js/catalog.js"></script>
    <script src="js/app.js"></script>
    <script>
        var bank = [
            { cat: 'Music', q: 'Which symbol means “play music louder”?', a: ['+', '▶', '🔊', '⏸'], c: 2 },
            { cat: 'Movies', q: 'What do credits usually show at the end of a movie?', a: ['Recipes', 'Cast and crew', 'Homework', 'Weather'], c: 1 },
            { cat: 'School', q: 'A triangle has how many sides?', a: ['2', '3', '4', '5'], c: 1 },
            { cat: 'Pop Culture', q: 'What do people usually use hashtags for?', a: ['To chill drinks', 'To tag topics', 'To open doors', 'To do math'], c: 1 },
            { cat: 'Tech', q: 'What does Wi‑Fi help you do?', a: ['Bake cookies', 'Connect online', 'Brush hair', 'Water plants'], c: 1 }
        ];
        var data = { score: 0, best: 0, idx: 0 };

        async function loadData() {
            var saved = await DreamApp.loadAppData('quizdaily');
            if (saved && typeof saved === 'object') data = saved;
            nextQuestion();
        }

        function persist() { DreamApp.saveAppData('quizdaily', data); }

        function nextQuestion() {
            data.idx = Math.floor(Math.random() * bank.length);
            var item = bank[data.idx];
            document.getElementById('quizCategory').textContent = item.cat + ' • Best streak ' + (data.best || 0);
            document.getElementById('quizQuestion').textContent = item.q;
            document.getElementById('quizResult').textContent = '';
            document.getElementById('answersWrap').innerHTML = item.a.map(function (answer, idx) {
                return '<button class="answer-btn" onclick="checkAnswer(' + idx + ', this)">' + DreamApp.escapeHtml(answer) + '</button>';
            }).join('');
        }

        function checkAnswer(idx, btn) {
            var correct = bank[data.idx].c;
            document.querySelectorAll('.answer-btn').forEach(function (item, i) {
                item.disabled = true;
                if (i === correct) item.classList.add('correct');
            });
            if (idx === correct) {
                btn.classList.add('correct');
                data.score = (data.score || 0) + 1;
                data.best = Math.max(data.best || 0, data.score || 0);
                DreamApp.awardXp(10, 'Quiz answer correct');
                document.getElementById('quizResult').textContent = 'Correct! Score streak: ' + data.score;
            } else {
                btn.classList.add('wrong');
                data.score = 0;
                document.getElementById('quizResult').textContent = 'Nice try — tap next for another quiz.';
            }
            persist();
        }

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
