<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DreamTube - Digital Dream</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="tablet-bg"></div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-left">
            <span class="status-time" id="statusTime">12:00 PM</span>
        </div>
        <div class="status-right">
            <i class="fas fa-wifi"></i>
            <i class="fas fa-signal"></i>
            <div class="battery"><div class="battery-bar"><div class="battery-fill"></div></div></div>
        </div>
    </div>

    <!-- App Content -->
    <div class="app-container">
        <!-- Header -->
        <div class="app-header">
            <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
            <div class="app-title">
                DreamTube
                <small>Watch & Discover</small>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="search-bar" id="searchBar">
            <i class="fas fa-search"></i>
            <input type="text" id="videoInput" placeholder="Paste YouTube URL or search..." 
                   onkeydown="if(event.key==='Enter')playVideo()">
            <button class="btn btn-sm btn-primary" onclick="playVideo()" style="border-radius:20px; padding:6px 14px">
                <i class="fas fa-play"></i>
            </button>
        </div>

        <!-- Video Player -->
        <div style="padding: 8px 16px">
            <div class="video-container" id="playerContainer">
                <div class="placeholder" id="videoPlaceholder">
                    <i class="fab fa-youtube"></i>
                    <p class="text-sm text-muted">Paste a YouTube link to start watching</p>
                </div>
                <iframe id="videoFrame" style="display:none" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen></iframe>
            </div>
        </div>

        <!-- Now Playing Info -->
        <div class="px-16" id="nowPlaying" style="display:none">
            <div class="glass-card">
                <div class="flex items-center justify-between">
                    <div>
                        <div class="font-bold text-sm" id="videoTitle">Now Playing</div>
                        <div class="text-xs text-muted" id="videoChannel">YouTube</div>
                    </div>
                    <div class="flex gap-8">
                        <button class="btn btn-sm btn-secondary" onclick="stopVideo()" title="Stop">
                            <i class="fas fa-stop"></i>
                        </button>
                        <button class="btn btn-sm btn-secondary" onclick="saveFavorite()" title="Favorite">
                            <i class="fas fa-heart"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabs: Favorites / History -->
        <div class="tabs mt-8">
            <div class="tab active" data-tab="favorites" onclick="switchTab('favorites')">
                <i class="fas fa-heart"></i> Favorites
            </div>
            <div class="tab" data-tab="history" onclick="switchTab('history')">
                <i class="fas fa-clock"></i> History
            </div>
        </div>

        <!-- Favorites List -->
        <div class="video-list" id="favoritesList">
            <div class="empty-state" id="favEmpty">
                <i class="fas fa-heart"></i>
                <h3>No Favorites Yet</h3>
                <p>Videos you heart will appear here</p>
            </div>
        </div>

        <!-- History List -->
        <div class="video-list hidden" id="historyList">
            <div class="empty-state" id="histEmpty">
                <i class="fas fa-clock"></i>
                <h3>No History</h3>
                <p>Videos you watch will appear here</p>
            </div>
        </div>

        <div style="height:16px"></div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i><span>Home</span>
        </a>
        <a href="messages.html" class="nav-item">
            <i class="fas fa-comment"></i><span>Chat</span>
        </a>
        <a href="browser.html" class="nav-item">
            <i class="fas fa-search"></i><span>Browse</span>
        </a>
        <a href="settings.html" class="nav-item">
            <i class="fas fa-cog"></i><span>Settings</span>
        </a>
    </div>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script>
        let currentVideoId = null;

        function playVideo() {
            const input = document.getElementById('videoInput').value.trim();
            if (!input) return;

            const videoId = DreamApp.extractYouTubeId(input);
            if (!videoId) {
                DreamApp.toast('Invalid YouTube URL', 'error');
                return;
            }

            currentVideoId = videoId;
            const frame = document.getElementById('videoFrame');
            const placeholder = document.getElementById('videoPlaceholder');

            frame.src = DreamApp.getYouTubeEmbed(videoId);
            frame.style.display = 'block';
            placeholder.style.display = 'none';
            document.getElementById('nowPlaying').style.display = 'block';
            document.getElementById('videoTitle').textContent = 'Playing: ' + DreamApp.escapeHtml(input.substring(0, 50));

            // Save to history
            addToHistory(videoId, input);
            DreamApp.toast('Now playing', 'success');
        }

        function stopVideo() {
            const frame = document.getElementById('videoFrame');
            frame.src = '';
            frame.style.display = 'none';
            document.getElementById('videoPlaceholder').style.display = 'flex';
            document.getElementById('nowPlaying').style.display = 'none';
            currentVideoId = null;
        }

        function saveFavorite() {
            if (!currentVideoId) return;
            const favs = JSON.parse(localStorage.getItem('dd-yt-favs') || '[]');
            if (favs.some(f => f.id === currentVideoId)) {
                DreamApp.toast('Already in favorites', 'error');
                return;
            }
            favs.unshift({
                id: currentVideoId,
                url: document.getElementById('videoInput').value.trim(),
                date: new Date().toISOString()
            });
            if (favs.length > 20) favs.pop();
            localStorage.setItem('dd-yt-favs', JSON.stringify(favs));
            renderFavorites();
            DreamApp.toast('Added to favorites!', 'success');
        }

        function addToHistory(videoId, url) {
            const hist = JSON.parse(localStorage.getItem('dd-yt-history') || '[]');
            // Remove duplicate if exists
            const filtered = hist.filter(h => h.id !== videoId);
            filtered.unshift({ id: videoId, url: url, date: new Date().toISOString() });
            if (filtered.length > 30) filtered.pop();
            localStorage.setItem('dd-yt-history', JSON.stringify(filtered));
            renderHistory();
        }

        function renderFavorites() {
            const favs = JSON.parse(localStorage.getItem('dd-yt-favs') || '[]');
            const container = document.getElementById('favoritesList');
            if (favs.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-heart"></i><h3>No Favorites Yet</h3><p>Videos you heart will appear here</p></div>';
                return;
            }
            container.innerHTML = favs.map(f => createVideoItem(f, true)).join('');
        }

        function renderHistory() {
            const hist = JSON.parse(localStorage.getItem('dd-yt-history') || '[]');
            const container = document.getElementById('historyList');
            if (hist.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-clock"></i><h3>No History</h3><p>Videos you watch will appear here</p></div>';
                return;
            }
            container.innerHTML = hist.map(h => createVideoItem(h, false)).join('');
        }

        function createVideoItem(item, isFav) {
            const thumb = 'https://img.youtube.com/vi/' + encodeURIComponent(item.id) + '/mqdefault.jpg';
            const safeUrl = DreamApp.escapeHtml(item.url || item.id);
            const timeStr = item.date ? DreamApp.timeAgo(item.date) : '';
            return '<div class="video-item" onclick="loadFromItem(\'' + DreamApp.escapeHtml(item.id) + '\',\'' + safeUrl + '\')">'
                + '<div class="thumb"><img src="' + thumb + '" alt="" onerror="this.style.display=\'none\'"><i class="fas fa-play-circle" style="position:absolute"></i></div>'
                + '<div class="video-info"><div class="video-title">' + safeUrl.substring(0, 40) + '</div>'
                + '<div class="video-meta">' + timeStr + '</div></div>'
                + (isFav ? '<button onclick="event.stopPropagation();removeFav(\'' + DreamApp.escapeHtml(item.id) + '\')" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px"><i class="fas fa-trash"></i></button>' : '')
                + '</div>';
        }

        function loadFromItem(videoId, url) {
            document.getElementById('videoInput').value = url;
            currentVideoId = videoId;
            const frame = document.getElementById('videoFrame');
            frame.src = DreamApp.getYouTubeEmbed(videoId);
            frame.style.display = 'block';
            document.getElementById('videoPlaceholder').style.display = 'none';
            document.getElementById('nowPlaying').style.display = 'block';
            document.getElementById('videoTitle').textContent = 'Playing: ' + url.substring(0, 50);
            addToHistory(videoId, url);
        }

        function removeFav(videoId) {
            let favs = JSON.parse(localStorage.getItem('dd-yt-favs') || '[]');
            favs = favs.filter(f => f.id !== videoId);
            localStorage.setItem('dd-yt-favs', JSON.stringify(favs));
            renderFavorites();
            DreamApp.toast('Removed from favorites', 'success');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
            document.getElementById('favoritesList').classList.toggle('hidden', tab !== 'favorites');
            document.getElementById('historyList').classList.toggle('hidden', tab !== 'history');
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderFavorites();
            renderHistory();
        });
    </script>
</body>
</html>
